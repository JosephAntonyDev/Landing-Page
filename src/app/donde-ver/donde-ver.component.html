<section class="donde-ver">
  <div class="container">
    <app-section-title title="Dónde Ver" subtitle="Las mejores plataformas para disfrutar anime"></app-section-title>

    <div class="platforms-grid">
      <article *ngFor="let p of animes" class="platform-item reveal">
        <div class="platform-logo">
          <img [src]="p.img" [alt]="p.title" loading="lazy">
        </div>
        <span class="platform-name">{{ p.title }}</span>
      </article>
    </div>
  </div>
</section>
