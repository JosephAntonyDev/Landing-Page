<section class="mas-vistos">
  <div class="container">
    <app-section-title title="Los Más Vistos" subtitle="Nuestra selección basada en popularidad global"></app-section-title>

    <div class="ranking-list">
      <article *ngFor="let anime of animesTop" class="ranking-card reveal">
        <div class="ranking-poster-wrapper">
          <div class="ranking-number">{{ anime.top }}</div>
          <div class="ranking-poster">
            <img [src]="anime.img" [alt]="anime.name" loading="lazy">
            <div class="ranking-overlay">
              <span class="ranking-play"><i class="fas fa-play"></i></span>
            </div>
            <span class="ranking-genre badge badge-orange" *ngIf="anime.genre">{{ anime.genre }}</span>
          </div>
        </div>
        <div class="ranking-info">
          <h3>{{ anime.name }}</h3>
          <div class="ranking-meta">
            <span class="star-rating" *ngIf="anime.rating">
              <i class="fas fa-star"></i>
              <span class="score">{{ anime.rating }}</span>
            </span>
            <span class="ranking-eps" *ngIf="anime.episodes">{{ anime.episodes }} eps</span>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
