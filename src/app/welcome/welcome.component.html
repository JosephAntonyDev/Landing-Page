<!-- HERO -->
<section id="hero" class="hero">
  <div class="hero-inner container">
    <div class="hero-content">
      <!-- Title (Updated to "mejores animes") -->
      <h1 class="hero-title reveal">
        Descubre los<br>
        <span class="gradient-text">mejores animes</span><br>
        del mundo.
      </h1>
      
      <!-- Layered Collage visual (placed between title and description) -->
      <div class="hero-visual reveal">
        <div class="hero-composition">
          <!-- Main Poster Card (Anime del Mes) -->
          <div class="hero-card main-card">
            <img src="assets/top/one-piece.jpg" alt="One Piece - Anime del Mes" loading="eager">
            <div class="hero-image-glow"></div>
          </div>
          
          <!-- Secondary Overlapping Card (Estreno Destacado) -->
          <div class="hero-card secondary-card">
            <img src="assets/carrusel/re.jpeg" alt="Re:Zero S3 - Estreno Destacado" loading="lazy">
            <div class="card-caption">Re:Zero S3</div>
          </div>
        </div>
      </div>

      <!-- Description -->
      <p class="hero-desc reveal">
        Rankings basados en crítica, calificación y éxito mundial.
        Explora estrenos, categorías y encuentra tu próximo anime favorito.
      </p>

      <!-- Actions -->
      <div class="hero-actions reveal">
        <button class="btn-primary" (click)="scrollToRankings()">
          <i class="fas fa-compass"></i> Explorar Rankings
        </button>
        <button class="btn-outline" (click)="scrollToSection('estrenos')">
          <i class="fas fa-bolt"></i> Estrenos
        </button>
      </div>

      <!-- Stats -->
      <div class="hero-stats reveal">
        <div class="stat">
          <span class="stat-number">5+</span>
          <span class="stat-label">Top Animes</span>
        </div>
        <div class="stat">
          <span class="stat-number">8+</span>
          <span class="stat-label">Plataformas</span>
        </div>
        <div class="stat">
          <span class="stat-number">5</span>
          <span class="stat-label">Categorías</span>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="section-divider"></div>

<section id="top" class="section">
  <app-top-mejores-animes></app-top-mejores-animes>
</section>

<div class="section-divider"></div>

<section id="estrenos" class="section">
  <app-carrusel></app-carrusel>
</section>

<div class="section-divider"></div>

<section id="vistos" class="section">
  <app-mas-vistos></app-mas-vistos>
</section>

<div class="section-divider"></div>

<section id="categorias" class="section">
  <app-categorias></app-categorias>
</section>

<div class="section-divider"></div>

<section id="ver" class="section">
  <app-donde-ver></app-donde-ver>
</section>
