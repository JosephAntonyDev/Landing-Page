<section class="categorias">
  <div class="container">
    <app-section-title title="Categorías" subtitle="Explora los géneros que definen el anime"></app-section-title>

    <div class="cat-grid">
      <article *ngFor="let cat of animesTop" class="cat-card reveal">
        <img [src]="cat.img" [alt]="cat.name" loading="lazy">
        <div class="cat-overlay">
          <span class="cat-index">0{{ cat.top }}</span>
          <h3>{{ cat.name }}</h3>
          <p>{{ cat.sinopsis }}</p>
        </div>
      </article>
    </div>
  </div>
</section>
